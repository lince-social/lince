<!DOCTYPE html><html lang="pt-BR"><head>
<script type="application/json" id="lince-manifest">
{
  "icon": "✎",
  "title": "Markdown Notes",
  "author": "Lince Labs",
  "version": "0.1.0",
  "description": "Bloco de notas em Markdown com alternancia entre texto cru e preview renderizado.",
  "details": "Widget minimalista sem moldura: um switch pequeno no topo direito alterna entre edicao raw e renderizacao Markdown.",
  "initial_width": 4,
  "initial_height": 4,
  "permissions": []
}
</script><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Markdown Notes</title><style>      :root {
        color-scheme: dark;
        --bg: transparent;
        --text: #f3f4f6;
        --muted: rgba(209, 213, 219, 0.68);
        --line: rgba(255, 255, 255, 0.14);
        --line-strong: rgba(255, 255, 255, 0.24);
        --accent: #f9fafb;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: transparent;
      }

      body {
        min-height: 100vh;
        padding: 12px 14px 14px;
        color: var(--text);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 10px;
        min-height: calc(100vh - 26px);
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
      }

      .mode-switch {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        user-select: none;
      }

      .mode-switch input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .mode-switch__track {
        position: relative;
        width: 34px;
        height: 20px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        transition: background 160ms ease;
      }

      .mode-switch__track::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.92);
        transition: transform 160ms ease;
      }

      .mode-switch input:checked + .mode-switch__track {
        background: rgba(255, 255, 255, 0.18);
      }

      .mode-switch input:checked + .mode-switch__track::after {
        transform: translateX(14px);
      }

      .raw,
      .preview {
        min-height: 0;
      }

      .raw {
        width: 100%;
        height: 100%;
        padding: 0;
        border: 0;
        resize: none;
        color: var(--text);
        background: transparent;
        font: 400 14px/1.7 "IBM Plex Mono", "SFMono-Regular", monospace;
        outline: none;
      }

      .raw::placeholder {
        color: rgba(209, 213, 219, 0.38);
      }

      .preview {
        overflow: auto;
      }

      [hidden] {
        display: none !important;
      }
    </style><style>
      .markdownRender {
        color: var(--text, inherit);
        line-height: 1.6;
        word-break: break-word;
      }

      .markdownRender :first-child {
        margin-top: 0;
      }

      .markdownRender :last-child {
        margin-bottom: 0;
      }

      .markdownRender h1,
      .markdownRender h2,
      .markdownRender h3,
      .markdownRender h4 {
        margin: 1.05em 0 0.42em;
        line-height: 1.2;
      }

      .markdownRender h1 { font-size: 1.8rem; }
      .markdownRender h2 { font-size: 1.4rem; }
      .markdownRender h3 { font-size: 1.1rem; }
      .markdownRender h4 { font-size: 1rem; }

      .markdownRender p,
      .markdownRender ul,
      .markdownRender ol,
      .markdownRender blockquote,
      .markdownRender pre {
        margin: 0 0 0.92em;
      }

      .markdownRender ul,
      .markdownRender ol {
        padding-left: 1.2rem;
      }

      .markdownRender blockquote {
        padding-left: 0.9rem;
        color: var(--muted, inherit);
        border-left: 2px solid rgba(255, 255, 255, 0.14);
      }

      .markdownRender code {
        padding: 0.08rem 0.32rem;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.06);
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 0.92em;
      }

      .markdownRender pre {
        overflow: auto;
      }

      .markdownRender pre code {
        display: block;
        padding: 0;
        background: transparent;
      }

      .markdownRender hr {
        border: 0;
        border-top: 1px solid var(--line, rgba(255, 255, 255, 0.14));
        margin: 1.2em 0;
      }

      .markdownRender a {
        color: var(--accent, inherit);
      }
</style></head><body><main class="app" data-signals="{ rendered: false }"><div class="toolbar"><label class="mode-switch"><input id="mode-toggle" type="checkbox" aria-label="Alternar preview markdown" data-bind:rendered><span class="mode-switch__track" aria-hidden="true"></span><span data-text="$rendered ? 'MD' : 'Raw'">Raw</span></label></div><textarea id="raw-input" class="raw" spellcheck="false" placeholder="# Notas

Escreva em Markdown aqui." data-show="!$rendered" style="display: none"></textarea><article id="preview" class="preview markdownRender" data-show="$rendered" style="display: none"></article></main><script>
      function escapeHtml(value) {
        return String(value == null ? "" : value).replace(/[&<>\"']/g, (char) =>
          ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          })[char],
        );
      }

      function applyInlineMarkdown(text) {
        return escapeHtml(text)
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/\*([^*]+)\*/g, "<em>$1</em>")
          .replace(
            /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
            '<a href="$2" target="_blank" rel="noreferrer">$1</a>',
          );
      }

      function renderMarkdown(source) {
        const lines = String(source || "").replace(/\r\n/g, "\n").split("\n");
        const blocks = [];
        let paragraph = [];
        let listItems = [];
        let listTag = "";
        let codeFence = [];
        let inFence = false;

        function flushParagraph() {
          if (!paragraph.length) {
            return;
          }
          blocks.push("<p>" + applyInlineMarkdown(paragraph.join(" ")) + "</p>");
          paragraph = [];
        }

        function flushList() {
          if (!listItems.length) {
            return;
          }
          blocks.push(
            "<" +
              listTag +
              ">" +
              listItems.map((item) => "<li>" + applyInlineMarkdown(item) + "</li>").join("") +
              "</" +
              listTag +
              ">",
          );
          listItems = [];
          listTag = "";
        }

        function flushFence() {
          if (!inFence) {
            return;
          }
          blocks.push("<pre><code>" + escapeHtml(codeFence.join("\n")) + "</code></pre>");
          codeFence = [];
          inFence = false;
        }

        for (const rawLine of lines) {
          const line = rawLine.trimEnd();
          const trimmed = line.trim();

          if (trimmed.startsWith("```")) {
            flushParagraph();
            flushList();
            if (inFence) {
              flushFence();
            } else {
              inFence = true;
              codeFence = [];
            }
            continue;
          }

          if (inFence) {
            codeFence.push(rawLine);
            continue;
          }

          if (!trimmed) {
            flushParagraph();
            flushList();
            continue;
          }

          const heading = trimmed.match(/^(#{1,4})\s+(.+)$/);
          if (heading) {
            flushParagraph();
            flushList();
            const level = heading[1].length;
            blocks.push("<h" + level + ">" + applyInlineMarkdown(heading[2]) + "</h" + level + ">");
            continue;
          }

          if (trimmed === "---" || trimmed === "***") {
            flushParagraph();
            flushList();
            blocks.push("<hr />");
            continue;
          }

          const bullet = trimmed.match(/^[-*]\s+(.+)$/);
          if (bullet) {
            flushParagraph();
            if (listTag && listTag !== "ul") {
              flushList();
            }
            listTag = "ul";
            listItems.push(bullet[1]);
            continue;
          }

          const ordered = trimmed.match(/^\d+\.\s+(.+)$/);
          if (ordered) {
            flushParagraph();
            if (listTag && listTag !== "ol") {
              flushList();
            }
            listTag = "ol";
            listItems.push(ordered[1]);
            continue;
          }

          const quote = trimmed.match(/^>\s+(.+)$/);
          if (quote) {
            flushParagraph();
            flushList();
            blocks.push("<blockquote>" + applyInlineMarkdown(quote[1]) + "</blockquote>");
            continue;
          }

          flushList();
          paragraph.push(trimmed);
        }

        flushParagraph();
        flushList();
        flushFence();
        return blocks.join("");
      }
      const toggle = document.getElementById("mode-toggle");
      const rawInput = document.getElementById("raw-input");
      const preview = document.getElementById("preview");
      const instanceId = window.frameElement?.dataset?.packageInstanceId || "preview";
      const noteKey = "markdown-notes/content/" + instanceId;
      const modeKey = "markdown-notes/mode/" + instanceId;

      const DEFAULT_TEXT = [
        "# Notas",
        "",
        "Escreva em **Markdown**.",
        "",
        "- `Raw` para editar",
        "- `MD` para renderizar",
      ].join("\n");

      function readStorage(key, fallback) {
        try {
          const value = window.localStorage.getItem(key);
          return value == null ? fallback : value;
        } catch (error) {
          return fallback;
        }
      }

      function writeStorage(key, value) {
        try {
          window.localStorage.setItem(key, value);
        } catch (error) {
          return;
        }
      }

      function syncRenderedSignal() {
        toggle.dispatchEvent(new Event("input", { bubbles: true }));
        toggle.dispatchEvent(new Event("change", { bubbles: true }));
      }

      function renderPreview() {
        preview.innerHTML = renderMarkdown(rawInput.value);
      }

      rawInput.value = readStorage(noteKey, DEFAULT_TEXT);
      rawInput.addEventListener("input", () => {
        writeStorage(noteKey, rawInput.value);
        if (toggle.checked) {
          renderPreview();
        }
      });

      toggle.addEventListener("change", () => {
        writeStorage(modeKey, toggle.checked ? "rendered" : "raw");
        if (toggle.checked) {
          renderPreview();
        } else {
          rawInput.focus();
        }
      });

      toggle.checked = readStorage(modeKey, "raw") === "rendered";
      syncRenderedSignal();
      if (toggle.checked) {
        renderPreview();
      } else {
        rawInput.focus();
      }
    </script></body></html>
