  "description": "Generic editable table for arbitrary view snapshots.",

      const app = document.getElementById("app");
      const frame = window.frameElement;
      const bridge = window.LinceWidgetHost || null;
      const instanceId = String(frame?.dataset?.packageInstanceId || "preview").trim() || "preview";
      const stateKey = "view-table-editor/" + instanceId;

      const state = {
        hostMeta: normalizeHostMeta({
          serverId: frame?.dataset?.linceServerId || "",
          viewId: frame?.dataset?.linceViewId || null,
          cardState: bridge?.getCardState?.() || {},
        }),
        table: null,
        edits: {},
        connected: false,
        loading: true,
        transportError: "",
        streamGeneration: 0,
        streamController: null,
        reconnectTimer: null,
        reconnectAttempt: 0,
        persistTimer: null,
      };

      state.edits = readInitialEdits();

      function storageArea() {
        try {
          if (window.parent && window.parent !== window && window.parent.localStorage) {
            return window.parent.localStorage;
          }
        } catch (error) {
        }

        try {
          return window.localStorage;
        } catch (error) {
          return null;
        }
      }

      function readFallbackState() {
        const storage = storageArea();
        if (!storage) {
          return {};
        }

        try {
          const raw = storage.getItem(stateKey);
          if (!raw) {
            return {};
          }

          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch (error) {
          return {};
        }
      }

      function writeFallbackState(nextState) {
        const storage = storageArea();
        if (!storage) {
          return;
        }

        try {
          storage.setItem(stateKey, JSON.stringify(nextState));
        } catch (error) {
        }
      }

      function cloneJsonValue(value, fallback = null) {
        try {
          if (value === undefined) {
            return fallback;
          }

          return JSON.parse(JSON.stringify(value));
        } catch (error) {
          return fallback;
        }
      }

      function isPlainObject(value) {
        return Boolean(
          value &&
          typeof value === "object" &&
          !Array.isArray(value) &&
          Object.getPrototypeOf(value) === Object.prototype
        );
      }

      function sortDeep(value) {
        if (Array.isArray(value)) {
          return value.map(sortDeep);
        }

        if (!isPlainObject(value)) {
          return value;
        }

        const out = {};
        for (const key of Object.keys(value).sort()) {
          out[key] = sortDeep(value[key]);
        }
        return out;
      }

      function stableJson(value) {
        try {
          return JSON.stringify(sortDeep(cloneJsonValue(value, {})));
        } catch (error) {
          return "";
        }
      }

      function normalizeHostMeta(rawMeta) {
        return {
          serverId: String(rawMeta?.serverId || rawMeta?.server_id || ""),
          viewId: rawMeta?.viewId == null
            ? (rawMeta?.view_id == null ? null : Number(rawMeta.view_id) || null)
            : Number(rawMeta.viewId) || null,
          cardState: cloneJsonValue(rawMeta?.cardState, {}),
          streams: {
            globalEnabled: rawMeta?.streams?.globalEnabled !== false,
            cardEnabled: rawMeta?.streams?.cardEnabled !== false,
            enabled: rawMeta?.streams?.enabled !== false,
          },
        };
      }

      function normalizeStoredEdits(rawEdits) {
        if (!isPlainObject(rawEdits)) {
          return {};
        }

        const normalized = {};
        for (const rowKey of Object.keys(rawEdits).sort()) {
          const rowEdits = rawEdits[rowKey];
          if (!isPlainObject(rowEdits)) {
            continue;
          }

          const nextRow = {};
          for (const columnKey of Object.keys(rowEdits).sort()) {
            nextRow[columnKey] = String(rowEdits[columnKey] ?? "");
          }

          if (Object.keys(nextRow).length) {
            normalized[rowKey] = nextRow;
          }
        }

        return normalized;
      }

      function readInitialEdits() {
        const hostState = state?.hostMeta?.cardState;
        const hostEdits = hostState?.tableState?.edits ?? hostState?.edits;
        if (isPlainObject(hostEdits)) {
          return normalizeStoredEdits(hostEdits);
        }

        const fallback = readFallbackState();
        return normalizeStoredEdits(fallback?.tableState?.edits ?? fallback?.edits);
      }

      function syncFallbackState() {
        writeFallbackState({
          tableState: {
            edits: state.edits,
          },
        });
      }

      function persistEditsSoon() {
        if (state.persistTimer) {
          window.clearTimeout(state.persistTimer);
        }

        state.persistTimer = window.setTimeout(() => {
          state.persistTimer = null;
          if (bridge?.patchCardState) {
            bridge.patchCardState({
              tableState: {
                edits: state.edits,
              },
            });
            return;
          }

          syncFallbackState();
        }, 160);
      }

      function stopReconnectTimer() {
        if (state.reconnectTimer) {
          window.clearTimeout(state.reconnectTimer);
          state.reconnectTimer = null;
        }
      }

      function clearStream() {
        stopReconnectTimer();

        if (state.streamController) {
          state.streamController.abort();
          state.streamController = null;
        }
      }

      function scheduleReconnect() {
        stopReconnectTimer();

        if (!hasValidConfig() || !streamEnabled()) {
          return;
        }

        const delay = Math.min(12000, 1200 * Math.max(1, state.reconnectAttempt + 1));
        state.reconnectAttempt += 1;
        state.reconnectTimer = window.setTimeout(() => connectStream(false), delay);
      }

      function streamEnabled() {
        return state.hostMeta.streams.globalEnabled !== false && state.hostMeta.streams.cardEnabled !== false;
      }

      function hasValidConfig() {
        return Boolean(state.hostMeta.serverId && Number.isInteger(state.hostMeta.viewId) && state.hostMeta.viewId > 0);
      }

      function buildStreamUrl() {
        if (!state.hostMeta.serverId) {
          return "";
        }

        if (!Number.isInteger(state.hostMeta.viewId) || state.hostMeta.viewId <= 0) {
          return "";
        }

        return (
          "/host/integrations/servers/" +
          encodeURIComponent(state.hostMeta.serverId) +
          "/views/" +
          encodeURIComponent(state.hostMeta.viewId) +
          "/stream"
        );
      }

      function parseEventBlock(block) {
        const lines = block.split("\n");
        let eventName = "message";
        const dataLines = [];

        for (const line of lines) {
          if (line.startsWith("event:")) {
            eventName = line.slice(6).trim();
          } else if (line.startsWith("data:")) {
            dataLines.push(line.slice(5).trimStart());
          }
        }

        return { event: eventName, data: dataLines.join("\n") };
      }

      function escapeHtml(value) {
        return String(value).replace(
          /[&<>"']/g,
          (char) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[char]
        );
      }

      function compactText(value, limit = 120) {
        const text = String(value || "").trim();
        if (text.length <= limit) {
          return text;
        }

        return text.slice(0, limit - 1).trimEnd() + "…";
      }

      function prettifyKey(key) {
        return String(key)
          .replaceAll("_", " ")
          .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
          .replace(/\s+/g, " ")
          .trim();
      }

      function formatCellValue(value) {
        if (value === null || value === undefined) {
          return "";
        }

        if (typeof value === "string") {
          return value;
        }

        if (typeof value === "number" || typeof value === "boolean" || typeof value === "bigint") {
          return String(value);
        }

        if (value instanceof Date) {
          return value.toISOString();
        }

        if (typeof value === "object") {
          try {
            return JSON.stringify(value, null, 2);
          } catch (error) {
            return String(value);
          }
        }

        return String(value);
      }

      function fingerprint(value) {
        let text = "";
        try {
          text = JSON.stringify(value);
        } catch (error) {
          text = String(value);
        }

        let hash = 2166136261;
        for (let index = 0; index < text.length; index += 1) {
          hash ^= text.charCodeAt(index);
          hash = Math.imul(hash, 16777619);
        }

        return (hash >>> 0).toString(16);
      }

      function columnSpecFromValue(rawColumn, index) {
        if (typeof rawColumn === "string") {
          return {
            key: rawColumn,
            label: prettifyKey(rawColumn),
          };
        }

        if (typeof rawColumn === "number") {
          const key = `col_${index + 1}`;
          return {
            key,
            label: String(rawColumn),
          };
        }

        if (isPlainObject(rawColumn)) {
          const key = String(
            rawColumn.key ??
            rawColumn.name ??
            rawColumn.id ??
            rawColumn.field ??
            rawColumn.label ??
            `col_${index + 1}`,
          );
          return {
            key,
            label: String(rawColumn.label ?? rawColumn.name ?? rawColumn.key ?? prettifyKey(key)),
          };
        }

        const key = `col_${index + 1}`;
        return {
          key,
          label: String(rawColumn ?? key),
        };
      }

      function inferColumns(rows, rawColumns) {
        const columns = [];
        const seen = new Set();

        function addColumn(spec) {
          const key = String(spec.key || "");
          if (!key || seen.has(key)) {
            return;
          }

          seen.add(key);
          columns.push({
            key,
            label: String(spec.label || prettifyKey(key)),
          });
        }

        if (Array.isArray(rawColumns) && rawColumns.length) {
          rawColumns.forEach((column, index) => addColumn(columnSpecFromValue(column, index)));
          return columns;
        }

        const arrayRows = rows.filter((row) => Array.isArray(row));
        if (arrayRows.length) {
          const maxLength = arrayRows.reduce(
            (max, row) => Math.max(max, row.length),
            0,
          );
          for (let index = 0; index < maxLength; index += 1) {
            addColumn({
              key: `col_${index + 1}`,
              label: `Column ${index + 1}`,
            });
          }
          return columns;
        }

        const objectRows = rows.filter((row) => isPlainObject(row));
        if (objectRows.length) {
          for (const row of objectRows) {
            for (const key of Object.keys(row)) {
              addColumn({
                key,
                label: prettifyKey(key),
              });
            }
          }
          if (columns.length) {
            return columns;
          }

          addColumn({
            key: "value",
            label: "Value",
          });
          return columns;
        }

        addColumn({
          key: "value",
          label: "Value",
        });
        return columns;
      }

      function pickRowKey(row, index) {
        if (Array.isArray(row)) {
          return `row-${index}-${fingerprint(row)}`;
        }

        if (isPlainObject(row)) {
          for (const key of ["id", "key", "uuid", "slug", "name"]) {
            const value = row[key];
            if (value !== undefined && value !== null && String(value).trim()) {
              return `${key}:${String(value)}`;
            }
          }

          return `row-${index}-${fingerprint(row)}`;
        }

        return `row-${index}-${fingerprint(row)}`;
      }

      function normalizeRows(rows, columns) {
        const normalized = [];

        for (let index = 0; index < rows.length; index += 1) {
          const row = rows[index];
          const key = pickRowKey(row, index);
          const values = {};
          const source = {};

          if (Array.isArray(row)) {
            for (let columnIndex = 0; columnIndex < columns.length; columnIndex += 1) {
              const column = columns[columnIndex];
              const rawValue = row[columnIndex];
              const text = formatCellValue(rawValue);
              values[column.key] = text;
              source[column.key] = rawValue;
            }
          } else if (isPlainObject(row)) {
            for (const column of columns) {
              const rawValue = row[column.key];
              const text = formatCellValue(rawValue);
              values[column.key] = text;
              source[column.key] = rawValue;
            }
          } else {
            const text = formatCellValue(row);
            values.value = text;
            source.value = row;
          }

          normalized.push({
            key,
            index,
            label: buildRowLabel(row, index),
            values,
            source,
          });
        }

        return normalized;
      }

      function buildRowLabel(row, index) {
        if (isPlainObject(row)) {
          for (const key of ["id", "key", "uuid", "slug", "name"]) {
            const value = row[key];
            if (value !== undefined && value !== null && String(value).trim()) {
              return `${key}: ${String(value)}`;
            }
          }
        }

        return `Row ${index + 1}`;
      }

      function normalizeTablePayload(payload) {
        const root = payload && typeof payload === "object" ? payload : null;
        const hasStructuredRows =
          root &&
          (Array.isArray(root.rows) ||
            Array.isArray(root.items) ||
            Array.isArray(root.data));
        const rowsSource = Array.isArray(payload)
          ? payload
          : hasStructuredRows
            ? (root.rows || root.items || root.data || [])
            : root
              ? [root]
              : [payload];
        const columnsSource =
          hasStructuredRows && Array.isArray(root.columns) ? root.columns : [];

        const columns = inferColumns(rowsSource, columnsSource);
        const rows = normalizeRows(rowsSource, columns);
        const name = root && String(root.name || root.title || root.view_name || root.viewName || "").trim();
        const query = root && String(root.query || "").trim();
        const kind = Array.isArray(payload)
          ? "array"
          : root && Array.isArray(root.rows)
            ? "view-snapshot"
            : isPlainObject(payload)
              ? "object"
              : "primitive";

        let subtitle = "";
        if (kind === "view-snapshot") {
          const segments = [];
          if (root?.view_id !== undefined || root?.viewId !== undefined) {
            segments.push(`view ${String(root.view_id ?? root.viewId)}`);
          }
          if (query) {
            segments.push(compactText(query, 120));
          }
          subtitle = segments.join(" · ");
        } else if (kind === "array") {
          subtitle = `${rows.length} item${rows.length === 1 ? "" : "s"} from an array payload`;
        } else if (kind === "object") {
          subtitle = `${Object.keys(root || {}).length} top-level key${Object.keys(root || {}).length === 1 ? "" : "s"}`;
        } else {
          subtitle = "Single primitive value normalized as a one-cell table.";
        }

        return {
          title: name || "Generic table",
          subtitle,
          kind,
          columns,
          rows,
          rowCount: rows.length,
          columnCount: columns.length,
        };
      }

      function getRowEdits(rowKey) {
        return state.edits[rowKey] || {};
      }

      function getCellValue(row, columnKey) {
        const rowEdits = getRowEdits(row.key);
        if (Object.prototype.hasOwnProperty.call(rowEdits, columnKey)) {
          return rowEdits[columnKey];
        }

        if (Object.prototype.hasOwnProperty.call(row.values, columnKey)) {
          return row.values[columnKey];
        }

        return "";
      }

      function getEditedCellCount() {
        let total = 0;
        for (const rowEdits of Object.values(state.edits)) {
          if (isPlainObject(rowEdits)) {
            total += Object.keys(rowEdits).length;
          }
        }
        return total;
      }

      function setStatus(text, tone = "idle") {
        const status = document.getElementById("status-pill");
        if (!status) {
          return;
        }

        status.textContent = text;
        status.dataset.tone = tone;
      }

      function setMetric(id, value) {
        const node = document.getElementById(id);
        if (node) {
          node.textContent = value;
        }
      }

      function updateMetrics() {
        const table = state.table;
        setMetric("metric-server", state.hostMeta.serverId ? `server: ${state.hostMeta.serverId}` : "server unset");
        setMetric("metric-view", Number.isInteger(state.hostMeta.viewId) ? `view: ${state.hostMeta.viewId}` : "view unset");
        setMetric("metric-rows", `rows: ${table ? table.rowCount : 0}`);
        setMetric("metric-columns", `columns: ${table ? table.columnCount : 0}`);
        setMetric("metric-edits", `edits: ${getEditedCellCount()}`);
        setMetric("metric-kind", `kind: ${table ? table.kind : "unloaded"}`);
      }

      function updateStatusFromConnection() {
        if (state.transportError) {
          setStatus("Offline", "error");
          return;
        }

        if (!hasValidConfig()) {
          setStatus("Configurar", "idle");
          return;
        }

        if (state.connected) {
          setStatus("Live", "live");
          return;
        }

        if (state.loading) {
          setStatus("Loading", "loading");
          return;
        }

        setStatus("Waiting", "idle");
      }

      function autosizeTextarea(textarea) {
        if (!textarea) {
          return;
        }

        textarea.style.height = "auto";
        textarea.style.height = Math.min(180, Math.max(34, textarea.scrollHeight)) + "px";
      }

      function renderMissingConfig() {
        return `
          <div class="panel configState">
            <div class="eyebrow">View table</div>
            <div class="stateTitle">Configure a server and view</div>
            <div class="stateCopy">
              This widget reads <code>server_id</code> and <code>view_id</code> from the host card configuration, then streams the view through the backend proxy.
            </div>
          </div>
        `;
      }

      function renderLoadingState() {
        return `
          <div class="panel loadingState">
            <div class="stateTitle">Opening stream</div>
            <div class="stateCopy">
              Waiting for the first snapshot from the selected view.
            </div>
          </div>
        `;
      }

      function renderErrorState(message) {
        return `
          <div class="panel errorState">
            <div class="stateTitle">Stream unavailable</div>
            <div class="stateCopy">${escapeHtml(message)}</div>
            <div class="sourceLine">
              <button class="button button--accent" type="button" data-action="reconnect">Retry</button>
            </div>
          </div>
        `;
      }

      function renderEmptyState() {
        return `
          <div class="panel emptyState">
            <div class="emptyTitle">No table data yet</div>
            <div class="stateCopy">
              The stream is connected, but the payload has not produced any rows or columns yet.
            </div>
          </div>
        `;
      }

      function renderCellEditor(row, column) {
        const baseValue = getCellValue(row, column.key);
        const rowEdits = getRowEdits(row.key);
        const hasEdit = Object.prototype.hasOwnProperty.call(rowEdits, column.key);
        const displayValue = hasEdit ? rowEdits[column.key] : baseValue;
        const editorValue = String(displayValue ?? "");

        return `
          <textarea
            class="cellEditor${hasEdit ? " is-edited" : ""}"
            data-cell-editor="true"
            data-row-key="${escapeHtml(row.key)}"
            data-column-key="${escapeHtml(column.key)}"
            data-base-value="${escapeHtml(String(baseValue ?? ""))}"
            rows="1"
            spellcheck="false"
            wrap="soft"
          >${escapeHtml(editorValue)}</textarea>
        `;
      }

      function renderTable() {
        const table = state.table;
        if (!table) {
          return "";
        }

        if (!table.columns.length && !table.rows.length) {
          return renderEmptyState();
        }

        const headerCells = table.columns
          .map((column) => `
            <th scope="col">
              <div class="columnName">${escapeHtml(column.label || column.key)}</div>
              <div class="columnKey">${escapeHtml(column.key)}</div>
            </th>
          `)
          .join("");

        const bodyRows = table.rows
          .map((row, index) => {
            const rowEdits = getRowEdits(row.key);
            const editedCount = isPlainObject(rowEdits) ? Object.keys(rowEdits).length : 0;
            const rowCells = table.columns
              .map((column) => {
                const baseValue = getCellValue(row, column.key);
                const editedValue = Object.prototype.hasOwnProperty.call(rowEdits, column.key)
                  ? rowEdits[column.key]
                  : baseValue;
                const dirty = String(editedValue ?? "") !== String(baseValue ?? "");

                return `
                  <td class="cell${dirty ? " is-edited" : ""}">
                    ${renderCellEditor(row, column)}
                  </td>
                `;
              })
              .join("");

            return `
              <tr data-row-key="${escapeHtml(row.key)}">
                <th scope="row" class="rowHeader">
                  <div class="rowSummary">
                    <div class="rowIndex">${escapeHtml(String(index + 1))}</div>
                    <div class="rowKey">${escapeHtml(row.label || row.key)}</div>
                    <div class="rowActions">
                      <button class="rowAction" type="button" data-row-reset data-row-key="${escapeHtml(row.key)}">Reset row</button>
                      ${editedCount ? `<span class="pill">${editedCount} edit${editedCount === 1 ? "" : "s"}</span>` : ""}
                    </div>
                  </div>
                </th>
                ${rowCells}
              </tr>
            `;
          })
          .join("");

        return `
          <div class="panel tablePanel">
            <div class="tableNote">
              Edits are stored only in this card state under <code>tableState.edits</code>. The source view remains unchanged.
            </div>
            <div class="tableWrap">
              <table class="table">
                <thead>
                  <tr>
                    <th scope="col">
                      <div class="columnName">Row</div>
                      <div class="columnKey">Identity</div>
                    </th>
                    ${headerCells}
                  </tr>
                </thead>
                <tbody>
                  ${bodyRows}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      function renderShell(content) {
        const table = state.table;
        const title = table ? table.title : "View Table Editor";
        const subtitle = table
          ? table.subtitle
          : "Stream a view snapshot and edit cells locally in the card state.";

        return `
          <div class="widget">
            <div class="panel sourcePanel">
              <div class="header">
                <div class="titleBlock">
                  <div class="eyebrow">View table</div>
                  <h1 class="title">${escapeHtml(title)}</h1>
                  <p class="copy">${escapeHtml(subtitle)}</p>
                </div>
                <div class="headerMeta">
                  <span id="status-pill" class="status" data-tone="idle">Waiting</span>
                  <div class="metrics">
                    <span class="pill" id="metric-server">server unset</span>
                    <span class="pill" id="metric-view">view unset</span>
                  </div>
                </div>
              </div>

              <div class="toolbar">
                <div class="sourceLine">
                  <button class="button button--accent" type="button" data-action="reconnect" ${streamEnabled() ? "" : "disabled"}>Reconnect</button>
                  <button class="button button--danger" type="button" data-action="reset-all" ${getEditedCellCount() ? "" : "disabled"}>Clear edits</button>
                </div>
                <div class="metrics">
                  <span class="pill" id="metric-kind">kind: unloaded</span>
                  <span class="pill" id="metric-rows">rows: 0</span>
                  <span class="pill" id="metric-columns">columns: 0</span>
                  <span class="pill" id="metric-edits">edits: 0</span>
                </div>
              </div>

              <div class="sourceHint">
                server <strong>${escapeHtml(state.hostMeta.serverId || "unset")}</strong> ·
                view <strong>${escapeHtml(Number.isInteger(state.hostMeta.viewId) ? String(state.hostMeta.viewId) : "unset")}</strong> ·
                ${streamEnabled() ? "stream enabled" : "stream paused"}
              </div>
            </div>

            ${content}

            <div class="footer">
              <span class="pill">Card-local edits only</span>
              <span class="pill">Source view stays read-only</span>
            </div>
          </div>
        `;
      }

      function render() {
        if (!hasValidConfig()) {
          app.innerHTML = renderShell(renderMissingConfig());
          updateMetrics();
          updateStatusFromConnection();
          bindActions();
          return;
        }

        if (state.transportError && !state.table) {
          app.innerHTML = renderShell(renderErrorState(state.transportError));
          updateMetrics();
          updateStatusFromConnection();
          bindActions();
          return;
        }

        if (state.loading && !state.table) {
          app.innerHTML = renderShell(renderLoadingState());
          updateMetrics();
          updateStatusFromConnection();
          bindActions();
          return;
        }

        app.innerHTML = renderShell(renderTable());
        updateMetrics();
        updateStatusFromConnection();
        bindActions();
        bindEditors();
      }

      function bindActions() {
        app.querySelectorAll("[data-action='reconnect']").forEach((button) => {
          button.addEventListener("click", () => reconnect());
        });

        app.querySelectorAll("[data-action='reset-all']").forEach((button) => {
          button.addEventListener("click", () => clearAllEdits());
        });

        app.querySelectorAll("[data-row-reset]").forEach((button) => {
          button.addEventListener("click", () => {
            const rowKey = String(button.dataset.rowKey || "");
            clearRowEdits(rowKey);
          });
        });
      }

      function bindEditors() {
        app.querySelectorAll("[data-cell-editor]").forEach((editor) => {
          if (editor.tagName === "TEXTAREA") {
            autosizeTextarea(editor);
          }

          editor.addEventListener("input", handleCellInput);
          editor.addEventListener("keydown", handleEditorKeydown);
        });
      }

      function handleEditorKeydown(event) {
        if (event.key !== "Escape") {
          return;
        }

        const target = event.currentTarget;
        if (!(target instanceof HTMLTextAreaElement)) {
          return;
        }

        const baseValue = String(target.dataset.baseValue || "");
        target.value = baseValue;
        handleCellInput({ currentTarget: target });
        event.preventDefault();
      }

      function updateCellDirtyClass(editor, value) {
        if (!editor) {
          return;
        }

        const baseValue = String(editor.dataset.baseValue || "");
        const dirty = String(value ?? "") !== baseValue;
        editor.classList.toggle("is-edited", dirty);
        const cell = editor.closest(".cell");
        if (cell) {
          cell.classList.toggle("is-edited", dirty);
        }
      }

      function setEditValue(rowKey, columnKey, value) {
        const baseValue = getBaseCellValue(rowKey, columnKey);
        const normalizedValue = String(value ?? "");
        const nextEdits = cloneJsonValue(state.edits, {});
        const rowEdits = isPlainObject(nextEdits[rowKey]) ? nextEdits[rowKey] : {};

        if (normalizedValue === String(baseValue ?? "")) {
          delete rowEdits[columnKey];
        } else {
          rowEdits[columnKey] = normalizedValue;
        }

        if (Object.keys(rowEdits).length) {
          nextEdits[rowKey] = rowEdits;
        } else {
          delete nextEdits[rowKey];
        }

        state.edits = normalizeStoredEdits(nextEdits);
      }

      function getBaseCellValue(rowKey, columnKey) {
        if (!state.table) {
          return "";
        }

        const row = state.table.rows.find((entry) => entry.key === rowKey);
        if (!row) {
          return "";
        }

        return String(row.values?.[columnKey] ?? "");
      }

      function handleCellInput(event) {
        const editor = event.currentTarget;
        if (!(editor instanceof HTMLTextAreaElement)) {
          return;
        }

        const rowKey = String(editor.dataset.rowKey || "");
        const columnKey = String(editor.dataset.columnKey || "");
        const value = editor.value;

        editor.dataset.baseValue = editor.dataset.baseValue || "";
        setEditValue(rowKey, columnKey, value);
        updateCellDirtyClass(editor, value);
        updateMetrics();
        persistEditsSoon();

        if (editor.tagName === "TEXTAREA") {
          autosizeTextarea(editor);
        }
      }

      function clearRowEdits(rowKey) {
        if (!rowKey || !state.edits[rowKey]) {
          return;
        }

        const nextEdits = cloneJsonValue(state.edits, {});
        delete nextEdits[rowKey];
        state.edits = normalizeStoredEdits(nextEdits);
        persistImmediately();
        render();
      }

      function clearAllEdits() {
        if (!getEditedCellCount()) {
          return;
        }

        state.edits = {};
        persistImmediately();
        render();
      }

      function persistImmediately() {
        if (state.persistTimer) {
          window.clearTimeout(state.persistTimer);
          state.persistTimer = null;
        }

        if (bridge?.patchCardState) {
          bridge.patchCardState({
            tableState: {
              edits: state.edits,
            },
          });
          return;
        }

        syncFallbackState();
      }

      function parseSsePayload(payload) {
        if (typeof payload === "string") {
          try {
            return JSON.parse(payload);
          } catch (error) {
            return payload;
          }
        }

        return payload;
      }

      function handleSnapshot(payload) {
        state.table = normalizeTablePayload(payload);
        state.loading = false;
        state.connected = true;
        state.transportError = "";
        state.reconnectAttempt = 0;
        render();
      }

      function handleStreamErrorPayload(payload) {
        const message = payload && typeof payload === "object" && payload.error
          ? String(payload.error)
          : "The backend stream reported an error.";
        state.connected = false;
        state.loading = false;
        state.transportError = message;
        render();
      }

      async function consumeSseResponse(response, generation, signal) {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done || signal.aborted || generation !== state.streamGeneration) {
            break;
          }

          buffer += decoder.decode(value, { stream: true });
          const blocks = buffer.split("\n\n");
          buffer = blocks.pop() || "";

          for (const block of blocks) {
            const trimmed = block.trim();
            if (!trimmed) {
              continue;
            }

            const event = parseEventBlock(trimmed);
            if (!event.data) {
              continue;
            }

            const payload = parseSsePayload(event.data);
            if (event.event === "snapshot") {
              handleSnapshot(payload);
            } else if (event.event === "error") {
              handleStreamErrorPayload(payload);
            }
          }
        }
      }

      async function connectStream(reset) {
        clearStream();

        if (!hasValidConfig() || !streamEnabled()) {
          state.loading = false;
          render();
          return;
        }

        if (reset) {
          state.loading = true;
          state.connected = false;
          state.transportError = "";
        }

        render();

        const generation = ++state.streamGeneration;
        const controller = new AbortController();
        state.streamController = controller;

        try {
          const response = await fetch(buildStreamUrl(), {
            headers: { Accept: "text/event-stream" },
            cache: "no-store",
            signal: controller.signal,
          });

          if (controller.signal.aborted || generation !== state.streamGeneration) {
            return;
          }

          if (response.status === 401) {
            bridge?.invalidateServerAuth?.(state.hostMeta.serverId);
            state.loading = false;
            state.connected = false;
            state.transportError = "Server locked. Authenticate it in the host to unlock this widget.";
            render();
            return;
          }

          if (!response.ok || !response.body) {
            const raw = await response.text().catch(() => "");
            throw new Error(raw || `Nao foi possivel abrir o stream (${response.status}).`);
          }

          state.connected = true;
          state.loading = !state.table;
          state.transportError = "";
          render();

          await consumeSseResponse(response, generation, controller.signal);

          if (controller.signal.aborted || generation !== state.streamGeneration) {
            return;
          }

          state.connected = false;
          state.loading = !state.table;
          state.transportError = "The stream ended. Reconnecting...";
          render();
          scheduleReconnect();
        } catch (error) {
          if (controller.signal.aborted || generation !== state.streamGeneration) {
            return;
          }

          state.connected = false;
          state.loading = !state.table;
          state.transportError = String(error instanceof Error ? error.message : error);
          render();
          scheduleReconnect();
        } finally {
          if (state.streamController === controller) {
            state.streamController = null;
          }
        }
      }

      function reconnect() {
        if (!hasValidConfig() || !streamEnabled()) {
          render();
          return;
        }

        connectStream(true);
      }

      function applyHostMeta(rawMeta) {
        const sourceMeta =
          rawMeta && typeof rawMeta === "object" && isPlainObject(rawMeta.meta)
            ? rawMeta.meta
            : rawMeta;
        const nextMeta = normalizeHostMeta(sourceMeta);
        const previousJson = stableJson(state.hostMeta.cardState?.tableState?.edits ?? state.hostMeta.cardState?.edits ?? {});
        const nextJson = stableJson(nextMeta.cardState?.tableState?.edits ?? nextMeta.cardState?.edits ?? {});

        state.hostMeta = nextMeta;

        if (nextJson !== previousJson && isPlainObject(nextMeta.cardState)) {
          state.edits = normalizeStoredEdits(nextMeta.cardState?.tableState?.edits ?? nextMeta.cardState?.edits ?? {});
        }

        if (!hasValidConfig()) {
          clearStream();
          state.loading = false;
          state.connected = false;
          render();
          return;
        }

        if (!streamEnabled()) {
          clearStream();
          state.loading = false;
          state.connected = false;
          render();
          return;
        }

        render();

        if (!state.table && !state.connected) {
          connectStream(true);
        }
      }

      function handleBridgeState(event) {
        applyHostMeta(event.detail || {});
      }

      app.addEventListener("lince-bridge-state", handleBridgeState);

      if (bridge?.requestState) {
        bridge.requestState();
      }

      if (state.hostMeta.serverId && Number.isInteger(state.hostMeta.viewId) && state.hostMeta.viewId > 0) {
        connectStream(true);
      } else {
        render();
      }
    </script></body></html>
