name: build-release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-feature-matrix:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            args: ""
          - name: http-only
            args: "--no-default-features --features http"
          - name: karma-only
            args: "--no-default-features --features karma"
          - name: tui-only
            args: "--no-default-features --features tui"
          - name: karma-tui
            args: "--no-default-features --features karma,tui"
          - name: gui-only
            args: "--no-default-features --features gui"
          - name: karma-gui
            args: "--no-default-features --features karma,gui"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Check feature combination
        shell: bash
        run: |
          set -euo pipefail
          export RUSTFLAGS="-D warnings"
          if [[ -n "${{ matrix.args }}" ]]; then
            cargo check --locked -p lince ${{ matrix.args }}
          else
            cargo check --locked -p lince
          fi

  build:
    needs: check-feature-matrix
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - os: macos-latest
            target: aarch64-apple-darwin

          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        shell: bash
        run: |
          export RUSTFLAGS="-D warnings"
          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            cargo build --locked --release --package lince --target ${{ matrix.target }} \
              --config "target.aarch64-apple-darwin.rustflags=['-C','target-feature=+neon,+aes,+sha2']"
          else
            cargo build --locked --release --package lince --target ${{ matrix.target }}
          fi

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          BIN=lince
          mkdir -p artifacts

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/${{ matrix.target }}/release/${BIN}.exe \
               artifacts/${BIN}-${{ matrix.target }}.exe
          else
            cp target/${{ matrix.target }}/release/${BIN} \
               artifacts/${BIN}-${{ matrix.target }}

            chmod +x artifacts/${BIN}-${{ matrix.target }}

            tar -czf artifacts/${BIN}-${{ matrix.target }}.tar.gz \
              -C artifacts ${BIN}-${{ matrix.target }}

            zip -j artifacts/${BIN}-${{ matrix.target }}.zip \
              artifacts/${BIN}-${{ matrix.target }}
          fi

          cd artifacts
          for asset in *; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$asset" > "${asset}.sha256"
            else
              shasum -a 256 "$asset" > "${asset}.sha256"
            fi
          done

      - name: Upload build artifact (temp)
        uses: actions/upload-artifact@v4
        with:
          name: lince-artifacts-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 1

  publish-rolling:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lince-artifacts-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG=rolling

          if ! gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GH_REPO" \
              --target "$GITHUB_SHA" \
              --title "Rolling build" \
              --notes "Latest automated build from the main branch."
          fi

          gh release upload "$TAG" release-artifacts/* --clobber --repo "$GH_REPO"

  publish-tag:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        run: git cliff --latest -o RELEASE_NOTES.md

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lince-artifacts-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish tagged release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: release-artifacts/*
