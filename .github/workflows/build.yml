name: desktop-release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Check
        shell: bash
        run: |
          set -euo pipefail
          export RUSTFLAGS="-D warnings"
          cargo check --locked -p lince

  desktop:
    needs: check
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: x86_64-unknown-linux-gnu-desktop

          - os: macos-latest
            artifact: aarch64-apple-darwin-desktop

          - os: windows-latest
            artifact: x86_64-pc-windows-msvc-desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: desktop-${{ runner.os }}-${{ matrix.artifact }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Check desktop crate
        shell: bash
        run: |
          set -euo pipefail
          export RUSTFLAGS="-D warnings"
          cargo check --release --locked -p lince-desktop

      - name: Create Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RUSTFLAGS: "-D warnings"
        with:
          projectPath: crates/desktop
          args: --verbose

      - name: Collect desktop artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p desktop-artifacts

          if [[ -d target/release/bundle ]]; then
            find target/release/bundle -type f \
              \( -name '*.deb' -o -name '*.AppImage' -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.msi' -o -name '*.exe' \) \
              -exec cp {} desktop-artifacts/ \;
          fi

          if [[ -d crates/desktop/target/release/bundle ]]; then
            find crates/desktop/target/release/bundle -type f \
              \( -name '*.deb' -o -name '*.AppImage' -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.msi' -o -name '*.exe' \) \
              -exec cp {} desktop-artifacts/ \;
          fi

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            cp scripts/install/macos-desktop-setup.sh desktop-artifacts/lince-macos-desktop-setup.sh
            chmod +x desktop-artifacts/lince-macos-desktop-setup.sh
          fi

          test -n "$(find desktop-artifacts -maxdepth 1 -type f)"

          cd desktop-artifacts
          for asset in *; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$asset" > "${asset}.sha256"
            else
              shasum -a 256 "$asset" > "${asset}.sha256"
            fi
          done

      - name: Upload desktop artifact (temp)
        uses: actions/upload-artifact@v4
        with:
          name: lince-desktop-artifacts-${{ matrix.artifact }}
          path: desktop-artifacts/*
          if-no-files-found: error
          retention-days: 1

  publish-rolling:
    if: github.ref == 'refs/heads/main'
    needs: [desktop]
    runs-on: ubuntu-latest
    env:
      ROLLING_TAG: rolling-${{ github.run_number }}

    steps:
      - uses: actions/checkout@v4

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lince-desktop-artifacts-*
          path: release-artifacts
          merge-multiple: true

      - name: Write update manifest
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          CHANNEL="rolling"
          {
            printf '{\n'
            printf '  "version": "%s",\n' "$VERSION"
            printf '  "revision": "%s",\n' "$GITHUB_SHA"
            printf '  "channel": "%s",\n' "$CHANNEL"
            printf '  "assets": [\n'
            first=1
            for asset_path in release-artifacts/*; do
              [ -f "$asset_path" ] || continue
              case "$asset_path" in
                *.sha256|*/lince-update.json) continue ;;
              esac
              asset="$(basename "$asset_path")"
              sum="$(awk '{print $1}' "${asset_path}.sha256")"
              if [ "$first" -eq 0 ]; then printf ',\n'; fi
              first=0
              printf '    {"name":"%s","url":"https://github.com/%s/releases/download/%s/%s","sha256":"%s","target":"","kind":"desktop"}' \
                "$asset" "$GITHUB_REPOSITORY" "$ROLLING_TAG" "$asset" "$sum"
            done
            printf '\n  ]\n'
            printf '}\n'
          } > release-artifacts/lince-update.json

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="$ROLLING_TAG"

          if ! gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GH_REPO" \
              --target "$GITHUB_SHA" \
              --title "Latest $TAG" \
              --notes "Latest desktop release from the main branch."
          fi

          gh release upload "$TAG" release-artifacts/* --clobber --repo "$GH_REPO"

  publish-tag:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [desktop]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        run: git cliff --latest -o RELEASE_NOTES.md

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lince-desktop-artifacts-*
          path: release-artifacts
          merge-multiple: true

      - name: Write update manifest
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          CHANNEL="${GITHUB_REF_NAME}"
          {
            printf '{\n'
            printf '  "version": "%s",\n' "$VERSION"
            printf '  "revision": "%s",\n' "$GITHUB_SHA"
            printf '  "channel": "%s",\n' "$CHANNEL"
            printf '  "assets": [\n'
            first=1
            for asset_path in release-artifacts/*; do
              [ -f "$asset_path" ] || continue
              case "$asset_path" in
                *.sha256|*/lince-update.json) continue ;;
              esac
              asset="$(basename "$asset_path")"
              sum="$(awk '{print $1}' "${asset_path}.sha256")"
              if [ "$first" -eq 0 ]; then printf ',\n'; fi
              first=0
              printf '    {"name":"%s","url":"https://github.com/%s/releases/download/%s/%s","sha256":"%s","target":"","kind":"desktop"}' \
                "$asset" "$GITHUB_REPOSITORY" "$CHANNEL" "$asset" "$sum"
            done
            printf '\n  ]\n'
            printf '}\n'
          } > release-artifacts/lince-update.json

      - name: Publish tagged release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: release-artifacts/*
