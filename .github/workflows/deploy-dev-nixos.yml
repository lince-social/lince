name: deploy-dev-manas-organ

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Manas Organ
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/git/lince-social/lince
            chmod +x .github/scripts/deploy-nixos.sh
            .github/scripts/deploy-nixos.sh
