name: deploy-dev-poll

on:
  workflow_dispatch:
    inputs:
      timeout_seconds:
        description: "How long to wait for the VPS deploy to finish"
        required: false
        default: "900"
      interval_seconds:
        description: "Polling interval in seconds"
        required: false
        default: "5"

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Poll background deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            REPO_DIR=/root/git/lince-social/lince
            STATE_DIR=/var/tmp/lince-deploy-dev

            cd "$REPO_DIR"

            LINCE_DEPLOY_STATE_DIR="$STATE_DIR" \
            bash ./run/deploy/deploy-dev-poll.sh \
              --timeout-seconds "${{ inputs.timeout_seconds }}" \
              --interval-seconds "${{ inputs.interval_seconds }}"
