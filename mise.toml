[env]
RUST_CHANNEL = "stable"
DOCS_ROOT = "documentation/technical"
FIRST_STEPS_ROOT = "documentation/first_steps"

[tools]
rust = "{{env.RUST_CHANNEL}}"

[tasks.update]
description = "Update rustup and dependencies"
run = "rustup self update && rustup update {{env.RUST_CHANNEL}} && cargo upgrade"

[tasks.off]
description = "Auto-fix code and clippy warnings"
tools = { "cargo:mprocs" = "latest", "cargo:bacon" = "latest" }
run = """
cargo fix --broken-code --allow-dirty
cargo clippy --fix --allow-dirty --quiet >/dev/null 2>&1
"""

[tasks.http]
description = "Run the HTML server"
run = """
RUSTFLAGS="-D warnings" cargo run --no-default-features --features 'karma http'
"""

[tasks.http-build]
description = "Build the release binary for the systemd HTTP service"
run = """
git switch dev
git pull
RUSTFLAGS="-D warnings" cargo build --release --no-default-features --features 'karma http'
"""

[tasks.http-install-service]
description = "Install and restart the systemd service for the release HTTP binary"
depends = ["http-build"]
run = """
cat <<EOF | sudo tee /etc/systemd/system/lince.service
[Unit]
Description=Lince Social
After=network.target

[Service]
User=root
WorkingDirectory=/root/git/lince-social/lince
EnvironmentFile=/root/git/lince-social/lince/.env
ExecStart=/root/git/lince-social/lince/target/release/lince
Restart=always
RestartSec=3

[Install]
WantedBy=multi-user.target
EOF

sudo systemctl daemon-reload
sudo systemctl enable lince
sudo systemctl restart lince
sudo systemctl status lince --no-pager -l
"""

[tasks.tui]
description = "Run the TUI frontend"
run = """
RUSTFLAGS="-D warnings" cargo run --no-default-features --features 'karma tui'
"""

[tasks.dev]
description = "Run with mprocs/bacon background jobs"
tools = { "cargo:mprocs" = "latest", "cargo:bacon" = "latest" }
run = 'mprocs "bacon . --job fix" "bacon . --job run"'

[tasks.service]
description = "Systemd service management + bacon + cargo run"
tools = { "cargo:mprocs" = "latest", "cargo:bacon" = "latest" }
run = """
mprocs \
"systemctl --user restart lince.service && journalctl --user -u lince.service -f --output=cat" \
"systemctl --user stop lince.service && journalctl --user -u lince.service -f --output=cat" \
"bacon . --job fix" \
"cargo run -- karma gui"
"""

[tasks.migrate]
description = "Create a reversible SQL migration"
tools = {"cargo:sqlx-cli" = "latest"}
usage = "arg '<name>' help='The name of the migration'"
run = """
echo Creating migration: $usage_name
sqlx migrate add -r $usage_name
echo Created migration: $usage_name
"""

[tasks.seed]
description = "Seed the database with initial data"
usage = """
arg "<root_password>" help="Root user password"
"""
run = """
ROOT_PASSWORD="${usage_root_password:-${ROOT_USER_PASSWORD:-}}"

if [ -z "${ROOT_PASSWORD:-}" ]; then
  echo "Pass the password as an argument or set ROOT_USER_PASSWORD"
  exit 1
fi

RUSTFLAGS="-D warnings" cargo run --no-default-features --features "karma, http" -- \
  --seed-root-user \
  --seed-root-user-password "$ROOT_PASSWORD"
"""

[tasks.init]
description = "Initialize the .env file with secrets and create root user"
run = """
# If .env does not exist, cp .env.example to .env and use rand for secret
if [ ! -f .env ]; then
  cp .env.example .env
  sed -i "s/SECRET=.*/SECRET=$(openssl rand -hex 32)/" .env
fi

if [ -z "${ROOT_USER_PASSWORD:-}" ]; then
  printf "Root user password: "
  stty -echo
  read ROOT_USER_PASSWORD
  stty echo
  printf "\\n"
fi

export ROOT_USER_PASSWORD
mise seed
"""

[tasks.docs]
description = "Start typst documentation preview"
tools = { "tinymist" = "latest", "typst" = "latest" }
usage = """
flag "-l --light" help="Use light mode in tinymist preview (default: dark)"
"""
run = """
LINCE_VERSION=$(awk 'BEGIN{in_pkg=0} /^[[]package[]]$/{in_pkg=1;next} /^[[]/{in_pkg=0} in_pkg&&/^version = /{print $3;exit}' crates/lince/Cargo.toml | xargs)

# Default to dark mode, use light if --light flag is passed
if [ "${usage_light:-false}" = "true" ]; then
  PREVIEW_DARK="false"
else
  PREVIEW_DARK="true"
fi

compile_docs() {
    echo '  → Compiling light version...'
    typst compile --root . --input dark=false --input lince_version="$LINCE_VERSION" {{env.DOCS_ROOT}}/lince-documentation.typ {{env.DOCS_ROOT}}/lince-documentation-light.pdf
    echo '  → Compiling dark version...'
    typst compile --root . --input dark=true --input lince_version="$LINCE_VERSION" {{env.DOCS_ROOT}}/lince-documentation.typ {{env.DOCS_ROOT}}/lince-documentation-dark.pdf
    echo 'Done!'
}

trap compile_docs EXIT

tinymist preview \
--root . \
--control-plane-host 127.0.0.1:3002 \
--data-plane-host 127.0.0.1:3001 \
--static-file-host 127.0.0.1:3003 \
--input dark=$PREVIEW_DARK \
--input lince_version=$LINCE_VERSION \
{{env.DOCS_ROOT}}/lince-documentation.typ
"""

[tasks.first-steps]
description = "Start first steps typst preview"
tools = { "tinymist" = "latest", "typst" = "latest" }
usage = """
flag "-l --light" help="Use light mode in tinymist preview (default: dark)"
"""
run = """
LINCE_VERSION=$(awk 'BEGIN{in_pkg=0} /^[[]package[]]$/{in_pkg=1;next} /^[[]/{in_pkg=0} in_pkg&&/^version = /{print $3;exit}' crates/lince/Cargo.toml | xargs)

if [ "${usage_light:-false}" = "true" ]; then
  PREVIEW_DARK="false"
else
  PREVIEW_DARK="true"
fi

compile_first_steps() {
    echo '  → Compiling first steps light version...'
    typst compile --root . --input dark=false --input lince_version="$LINCE_VERSION" {{env.FIRST_STEPS_ROOT}}/first_steps.typ {{env.FIRST_STEPS_ROOT}}/first_steps-light.pdf
    echo '  → Compiling first steps dark version...'
    typst compile --root . --input dark=true --input lince_version="$LINCE_VERSION" {{env.FIRST_STEPS_ROOT}}/first_steps.typ {{env.FIRST_STEPS_ROOT}}/first_steps-dark.pdf
    echo 'Done!'
}

trap compile_first_steps EXIT

tinymist preview \
--root . \
--control-plane-host 127.0.0.1:3012 \
--data-plane-host 127.0.0.1:3011 \
--static-file-host 127.0.0.1:3013 \
--input dark=$PREVIEW_DARK \
--input lince_version=$LINCE_VERSION \
{{env.FIRST_STEPS_ROOT}}/first_steps.typ
"""

[tasks.first-steps-build]
description = "Build first steps typst PDFs"
tools = { "typst" = "latest" }
run = """
LINCE_VERSION=$(awk 'BEGIN{in_pkg=0} /^[[]package[]]$/{in_pkg=1;next} /^[[]/{in_pkg=0} in_pkg&&/^version = /{print $3;exit}' crates/lince/Cargo.toml | xargs)
typst compile --root . --input dark=false --input lince_version="$LINCE_VERSION" {{env.FIRST_STEPS_ROOT}}/first_steps.typ {{env.FIRST_STEPS_ROOT}}/first_steps-light.pdf
typst compile --root . --input dark=true --input lince_version="$LINCE_VERSION" {{env.FIRST_STEPS_ROOT}}/first_steps.typ {{env.FIRST_STEPS_ROOT}}/first_steps-dark.pdf
"""

[tasks.first-steps-slides]
description = "Start first steps slides preview"
tools = { "tinymist" = "latest", "typst" = "latest", "pipx:touying" = "latest" }
run = """
SOURCE_FILE="{{env.FIRST_STEPS_ROOT}}/first_steps.typ"
SYS_INPUTS='{"slides":"true"}'

trap 'touying compile --root . --format html --sys-inputs "$SYS_INPUTS" "$SOURCE_FILE"' EXIT

tinymist preview \
  --root . \
  --control-plane-host 127.0.0.1:3022 \
  --data-plane-host 127.0.0.1:3021 \
  --static-file-host 127.0.0.1:3023 \
  --input slides=true \
  "$SOURCE_FILE"
"""

[tasks.first-steps-slides-build]
description = "Build first steps slides outputs"
tools = { "typst" = "latest", "pipx:touying" = "latest" }
run = """
SOURCE_FILE="{{env.FIRST_STEPS_ROOT}}/first_steps.typ"
touying compile --root . --format html --sys-inputs '{"slides":"true"}' "$SOURCE_FILE"
typst compile --root . --input slides=true "$SOURCE_FILE" "{{env.FIRST_STEPS_ROOT}}/first_steps-slides.pdf"
"""

[tasks.release]
description = "Automated release workflow"
tools = { "cargo:git-cliff" = "latest", "cargo:cargo-edit" = "latest", "gh" = "latest" }
run = """
set -e
[[ $(git rev-parse --abbrev-ref HEAD) != "main" ]] && echo "❌ main only" && exit 1
gh auth status >/dev/null || { echo "🔑 login required"; exit 1; }

SUGGESTED_VER=$(git cliff --bumped-version 2>/dev/null || echo "0.1.0")
read -rp "Version (auto: $SUGGESTED_VER): " USER_INPUT
VERSION=${USER_INPUT:-$SUGGESTED_VER}
[[ $VERSION != v* ]] && VERSION="v$VERSION"

git cliff --unreleased --bump --tag "$VERSION" -o CHANGELOG.md
cargo set-version "${VERSION#v}"
git add . && git commit -m "chore(release): $VERSION" && git tag -a "$VERSION" -m "$VERSION"
git push origin main "$VERSION"
gh run list --workflow=build-release --limit 1 --json url -q '.[0].url'
"""

[tasks.cross]
description = "Cross-build using cross-rs"
tools = { "cargo:cross" = "latest" }
run = "docker pull ghcr.io/cross-rs/x86_64-unknown-linux-gnu:main --platform linux/x86_64 && cross build --target x86_64-unknown-linux-gnu --release"
