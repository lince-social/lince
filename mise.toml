[env]
RUST_CHANNEL = "stable"
DOCS_ROOT = "documentation/technical"
FIRST_STEPS_ROOT = "documentation/first_steps"

[tools]
rust = "{{env.RUST_CHANNEL}}"

[tasks.typst]
description = "Run Typst and Touying workflows"
tools = { "tinymist" = "latest", "typst" = "latest", "pipx:touying" = "latest" }
usage = """
arg "target" help="Target workflow: docs or first-steps"
arg "action" help="Action: preview, compile, all, html, or slides"
flag "-l --light" help="Use light mode in preview flows"
"""
run = """
if [ "${usage_light:-false}" = "true" ]; then
  ./run/typst.sh "$usage_target" "$usage_action" --light
else
  ./run/typst.sh "$usage_target" "$usage_action"
fi
"""

[tasks.version-release]
description = "Automated release workflow"
tools = { "cargo:git-cliff" = "latest", "cargo:cargo-edit" = "latest", "gh" = "latest" }
run = "./run/release.sh"
