[env]
DOCS_ROOT = "documentation"

[tools]
rust = "stable"

[tasks.release]
description = "Automated release workflow"
tools = { "cargo:git-cliff" = "latest", "cargo:cargo-edit" = "latest", "gh" = "latest" }
run = "./run/release.sh"

[tasks.publish-crates]
description = "Publish the internal crates and the lince binary to crates.io"
run = "./run/publish-crates.sh"

[tasks.backup-rustfs]
description = "Mirror a RustFS bucket into a backup bucket"
tools = { "mc" = "latest" }
run = "bash ./run/backup-rustfs.sh"
